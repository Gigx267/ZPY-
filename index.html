<!DOCTYPE html>
<html lang="de" dir="ltr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZPYU – Zentrum für Präventivmedizin Yunusah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   THEME VARIABLES – BLUE & LUXURY
═══════════════════════════════════════ */
:root {
  --ease: 0.45s cubic-bezier(0.22, 0.92, 0.36, 1);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Jost', 'Helvetica Neue', sans-serif;
  /* Luxury blue palette */
  --blue-deep:    #0a2540;      /* deep navy */
  --blue-rich:    #1a4972;      /* rich sapphire */
  --blue-satin:   #2c628a;      /* elegant medium */
  --blue-mist:    #eef4fc;      /* airy light */
  --gold:         #c5a267;      /* refined champagne gold */
  --gold-light:   #e0c894;
  --gold-pale:    #faf5e9;
}

/* LIGHT MODE – luminous & luxurious */
[data-theme="light"] {
  --bg:           #ffffff;
  --bg2:          #f9fbfe;
  --bg3:          #f0f5fc;
  --text:         #152b42;
  --text-mid:     #2c4c6e;
  --text-soft:    #7c93aa;
  --border:       rgba(26, 73, 114, 0.12);
  --card:         #ffffff;
  --nav-bg:       rgba(255, 255, 255, 0.98);
  --nav-border:   rgba(26, 73, 114, 0.12);
  --nav-shadow:   0 8px 32px rgba(10, 37, 64, 0.06);
  --hero-bg:      #ffffff;
  --hero-deco:    rgba(26, 73, 114, 0.02);
  --hero-circle:  #eef4fc;
  --section-alt:  #f9fbfe;
  --usp-hover:    #1a4972;
  --usp-hover-text:#ffffff;
  --phil-bg:      #0a2540;
  --phil-text:    rgba(255, 255, 255, 0.75);
  --footer-bg:    #0a2540;
  --footer-text:  rgba(255, 255, 255, 0.35);
  --toggle-bg:    rgba(26, 73, 114, 0.08);
  --toggle-icon-show: '☀';
  --intl-right:   #f0f5fc;
  --intl-right-val:#1a4972;
  --hours-bg:     #f9fbfe;
  --input-bg:     #ffffff;
  --input-focus:  #eef4fc;
  --tag-border:   rgba(26, 73, 114, 0.25);
  --tag-color:    #1a4972;
  --gold-accent:  #c5a267;
}

/* DARK MODE – deep, nocturnal luxury */
[data-theme="dark"] {
  --bg:           #0f1a24;
  --bg2:          #14222e;
  --bg3:          #1c2e3e;
  --text:         #ecf3f9;
  --text-mid:     #b7cddf;
  --text-soft:    #7a94ae;
  --border:       rgba(197, 162, 103, 0.22);
  --card:         #162633;
  --nav-bg:       rgba(15, 26, 36, 0.97);
  --nav-border:   rgba(197, 162, 103, 0.18);
  --nav-shadow:   0 8px 32px rgba(0,0,0,0.4);
  --hero-bg:      #0f1a24;
  --hero-deco:    rgba(197, 162, 103, 0.03);
  --hero-circle:  #1c2e3e;
  --section-alt:  #111e28;
  --usp-hover:    #c5a267;
  --usp-hover-text:#0f1a24;
  --phil-bg:      #080f15;
  --phil-text:    rgba(255, 255, 255, 0.6);
  --footer-bg:    #080f15;
  --footer-text:  rgba(255, 255, 255, 0.2);
  --toggle-bg:    rgba(197, 162, 103, 0.15);
  --intl-right:   #162633;
  --intl-right-val:#e0c894;
  --hours-bg:     #162633;
  --input-bg:     #162633;
  --input-focus:  #1c2e3e;
  --tag-border:   rgba(197, 162, 103, 0.45);
  --tag-color:    #e0c894;
  --gold-accent:  #e0c894;
}

/* Smooth theme transition */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  transition: background-color var(--ease), border-color var(--ease), color var(--ease), box-shadow var(--ease);
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); color: var(--text); background: var(--bg); overflow-x: hidden; }
[lang="ar"] { direction: rtl; }

/* ═══════════════════════════════════════
LANG BAR – gold accents
═══════════════════════════════════════ */
.lang-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
  background: var(--blue-rich); display: flex; align-items: center;
  justify-content: space-between; padding: 0 40px; height: 34px;
}
.lang-bar-right { display: flex; gap: 4px; align-items: center; }
.lang-bar button {
  background: none; border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.7); font-family: var(--sans); font-size: 11px;
  letter-spacing: 1px; padding: 3px 10px; cursor: pointer;
  transition: var(--ease); border-radius: 2px;
}
.lang-bar button:hover, .lang-bar button.active {
  background: var(--gold); border-color: var(--gold); color: #0a2540; font-weight: 500;
}
.lang-bar-left {
  font-family: var(--serif); font-size: 13px; color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}

/* ═══════════════════════════════════════
THEME TOGGLE – refined
═══════════════════════════════════════ */
.theme-toggle {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  background: var(--toggle-bg); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 28px; transition: var(--ease);
  margin-right: 12px;
}
.theme-toggle:hover { border-color: var(--gold); }
.toggle-track {
  width: 36px; height: 20px; background: var(--border);
  border-radius: 10px; position: relative; transition: var(--ease);
  flex-shrink: 0;
}
[data-theme="dark"] .toggle-track { background: var(--gold); }
.toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; transition: var(--ease);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
[data-theme="dark"] .toggle-thumb { transform: translateX(16px); }
.toggle-label {
  font-family: var(--sans); font-size: 11px;
  color: rgba(255,255,255,0.8); letter-spacing: 1px; white-space: nowrap;
}
.toggle-icon { font-size: 14px; }

/* ═══════════════════════════════════════
NAV – elegant blue emphasis
═══════════════════════════════════════ */
nav {
  position: fixed; top: 34px; left: 0; right: 0; z-index: 1000;
  background: var(--nav-bg); backdrop-filter: blur(18px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; height: 70px;
  border-bottom: 1px solid var(--nav-border);
  box-shadow: var(--nav-shadow);
}
.nav-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; cursor: pointer; }
.nav-logo-zpyu { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--blue-satin); letter-spacing: 2px; }
[data-theme="dark"] .nav-logo-zpyu { color: var(--gold); }
.nav-logo-div { width: 1px; height: 28px; background: var(--border); }
.nav-logo-sub { font-family: var(--sans); font-size: 10px; color: var(--text-mid); letter-spacing: 1.2px; line-height: 1.4; text-transform: uppercase; }
.nav-links { display: flex; gap: 38px; list-style: none; }
.nav-links a {
  font-family: var(--sans); font-size: 11.5px; font-weight: 400;
  color: var(--text-mid); text-decoration: none; letter-spacing: 1.6px;
  text-transform: uppercase; transition: var(--ease);
  position: relative; padding-bottom: 5px; cursor: pointer;
}
.nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--gold); transition: var(--ease); }
.nav-links a:hover { color: var(--blue-satin); }
[data-theme="dark"] .nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }
.nav-cta { background: var(--blue-rich) !important; color: #fff !important; padding: 8px 22px; border-radius: 2px; font-weight: 500 !important; box-shadow: 0 2px 8px rgba(10,37,64,0.2);}
[data-theme="dark"] .nav-cta { background: var(--gold) !important; color: #0a2540 !important; }
.nav-cta::after { display: none !important; }

/* ═══════════════════════════════════════
SECTIONS
═══════════════════════════════════════ */
section { display: none; }
section.active { display: block; }

/* ─── HERO ─── with luxury blue gradient circles */
.hero {
  min-height: 100vh; background: var(--hero-bg);
  display: flex; align-items: center;
  padding: 140px 60px 80px; position: relative; overflow: hidden;
}
.hero-circle1 { position: absolute; top: -140px; right: -140px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, var(--hero-circle), transparent 70%); pointer-events: none; }
.hero-circle2 { position: absolute; top: 60px; right: 60px; width: 440px; height: 440px; border-radius: 50%; border: 1px solid var(--border); pointer-events: none; opacity: 0.5; }
.hero-content { max-width: 660px; position: relative; z-index: 1; }
.hero-eyebrow { font-family: var(--sans); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
.hero-eyebrow::before { content: ''; width: 40px; height: 1px; background: var(--gold); }
.hero h1 { font-family: var(--serif); font-size: clamp(42px,5.5vw,72px); font-weight: 300; color: var(--text); line-height: 1.12; margin-bottom: 28px; }
.hero h1 em { font-style: italic; color: var(--blue-satin); font-weight: 500; }
[data-theme="dark"] .hero h1 em { color: var(--gold-light); }
.hero-sub { font-size: 17px; font-weight: 300; color: var(--text-mid); line-height: 1.7; margin-bottom: 46px; max-width: 500px; }
.hero-btns { display: flex; gap: 18px; flex-wrap: wrap; }
.btn-p { background: var(--blue-rich); color: #fff; padding: 14px 34px; font-family: var(--sans); font-size: 12px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; border: none; border-radius: 2px; cursor: pointer; transition: var(--ease); box-shadow: 0 4px 12px rgba(26,73,114,0.2); }
.btn-p:hover { background: var(--blue-satin); transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26,73,114,0.3); }
[data-theme="dark"] .btn-p { background: var(--gold); color: #0f1a24; }
[data-theme="dark"] .btn-p:hover { background: var(--gold-light); }
.btn-s { background: transparent; color: var(--blue-satin); padding: 13px 30px; font-family: var(--sans); font-size: 12px; font-weight: 400; letter-spacing: 1.8px; text-transform: uppercase; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; transition: var(--ease); }
.btn-s:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
.hero-deco { position: absolute; right: 40px; bottom: 30px; font-family: var(--serif); font-size: 200px; font-weight: 700; color: var(--hero-deco); letter-spacing: -6px; pointer-events: none; user-select: none; line-height: 1; opacity: 0.4; }

/* ─── SHARED SECTION ─── */
.sec-wrap { padding: 100px 60px; }
.sec-wrap.alt { background: var(--section-alt); }
.sec-label { font-family: var(--sans); font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.sec-label::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
.sec-title { font-family: var(--serif); font-size: clamp(32px,4vw,52px); font-weight: 300; color: var(--text); margin-bottom: 56px; line-height: 1.2; }
.sec-title em { font-style: italic; color: var(--blue-satin); }
[data-theme="dark"] .sec-title em { color: var(--gold-light); }

/* ─── USP GRID – blue luxury cards */
.usp-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); }
.usp-card { background: var(--card); padding: 46px 32px; position: relative; overflow: hidden; transition: var(--ease); }
.usp-card:hover { background: var(--usp-hover); transform: translateY(-4px); box-shadow: 0 24px 44px rgba(10,37,64,0.12); }
.usp-card:hover .usp-h, .usp-card:hover .usp-p { color: var(--usp-hover-text); }
.usp-card:hover .usp-icon-box { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }
.usp-n { position: absolute; top: 12px; right: 18px; font-family: var(--serif); font-size: 72px; font-weight: 700; color: var(--border); line-height: 1; pointer-events: none; opacity: 0.5; }
.usp-icon-box { width: 50px; height: 50px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; font-size: 22px; transition: var(--ease); }
.usp-h { font-family: var(--serif); font-size: 23px; font-weight: 600; color: var(--text); margin-bottom: 12px; transition: var(--ease); }
.usp-p { font-size: 13px; color: var(--text-mid); line-height: 1.7; font-weight: 300; transition: var(--ease); }

/* ─── PROFILE – elegant blue signature */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.profile-name { font-family: var(--serif); font-size: clamp(34px,4vw,56px); font-weight: 300; color: var(--text); margin-bottom: 8px; line-height: 1.15; }
.profile-role { font-size: 13px; color: var(--blue-satin); letter-spacing: 1px; margin-bottom: 28px; font-weight: 400; text-transform: uppercase; }
[data-theme="dark"] .profile-role { color: var(--gold-light); }
.profile-body { font-size: 15px; color: var(--text-mid); line-height: 1.8; font-weight: 300; margin-bottom: 28px; }
.p-tags { display: flex; flex-wrap: wrap; gap: 10px; }
.p-tag { padding: 6px 16px; border: 1px solid var(--tag-border); color: var(--tag-color); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; border-radius: 1px; background: rgba(197,162,103,0.05);}
.why-box { background: var(--bg3); border-left: 4px solid var(--gold); padding: 44px; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.02);}
.why-box::before { content: ''; position: absolute; top: 0; left: 0; width: 48px; height: 2px; background: var(--gold); }
.why-label { font-family: var(--sans); font-size: 10px; letter-spacing: 2.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 28px; font-weight: 500; }
.why-item { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; color: var(--text-mid); font-size: 14px; line-height: 1.6; font-weight: 300; }
.why-item::before { content: '—'; color: var(--gold); flex-shrink: 0; font-weight: 500; }

/* ─── LEISTUNGEN ─── */
.l-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); margin-top: 56px; }
.l-card { background: var(--card); padding: 44px 36px; transition: var(--ease); }
.l-card:hover { background: var(--bg3); transform: translateY(-2px);}
.l-num { font-family: var(--serif); font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-bottom: 14px; display: block; }
.l-title { font-family: var(--serif); font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 24px; line-height: 1.25; }
.l-list { list-style: none; }
.l-item { font-size: 13px; color: var(--text-mid); padding: 9px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-weight: 300; }
.l-item::before { content: ''; width: 6px; height: 1px; background: var(--gold); flex-shrink: 0; }

/* ─── PHILOSOPHIE – blue & gold statement */
.phil-sec { background: var(--phil-bg); padding: 130px 60px; position: relative; overflow: hidden; }
.phil-sec::before { content: '”'; position: absolute; top: -20px; left: 30px; font-family: var(--serif); font-size: 360px; color: rgba(197,162,103,0.06); line-height: 1; pointer-events: none; }
.phil-inner { max-width: 800px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
.phil-inner .sec-label { justify-content: center; color: var(--gold-light); }
.phil-inner .sec-label::before { background: var(--gold-light); }
.phil-title { font-family: var(--serif); font-size: clamp(36px,4.2vw,56px); font-weight: 300; color: #fff; margin-bottom: 44px; line-height: 1.2; }
.phil-title em { font-style: italic; color: var(--gold-light); }
.phil-p { font-size: 16px; color: var(--phil-text); line-height: 1.9; font-weight: 300; margin-bottom: 24px; }
.phil-line { width: 70px; height: 1px; background: var(--gold); margin: 46px auto; }

/* ─── INTERNATIONAL ─── */
.intl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.intl-svcs { display: flex; flex-direction: column; gap: 1px; margin-top: 34px; background: var(--border); }
.intl-s { background: var(--card); padding: 18px 24px; display: flex; align-items: center; gap: 16px; font-size: 14px; color: var(--text-mid); font-weight: 300; transition: var(--ease); border-left: 3px solid transparent; }
.intl-s:hover { border-left-color: var(--gold); color: var(--text); background: var(--bg3); transform: translateX(5px); }
.flags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
.flag { padding: 7px 16px; background: var(--card); border: 1px solid var(--border); font-size: 12px; color: var(--text-mid); border-radius: 2px; font-weight: 300; }
.intl-right { background: var(--intl-right); border: 1px solid var(--border); padding: 56px; display: flex; flex-direction: column; gap: 38px; box-shadow: 0 12px 28px rgba(0,0,0,0.03);}
.i-stat { padding-bottom: 36px; border-bottom: 1px solid var(--border); }
.i-stat:last-child { border-bottom: none; padding-bottom: 0; }
.i-stat-val { font-family: var(--serif); font-size: 56px; font-weight: 300; color: var(--intl-right-val); line-height: 1; letter-spacing: -1px; }
.i-stat-lbl { font-size: 11px; color: var(--text-soft); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

/* ─── KONTAKT – refined forms */
.k-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 56px; }
.k-info { display: flex; flex-direction: column; gap: 28px; }
.k-item { display: flex; gap: 20px; align-items: flex-start; }
.k-icon { width: 48px; height: 48px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: var(--bg3);}
.k-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 4px; }
.k-val { font-size: 15px; color: var(--text); font-weight: 300; line-height: 1.5; }
.k-hours { background: var(--hours-bg); border: 1px solid var(--border); padding: 32px; border-top: 3px solid var(--gold);}
.k-hours-t { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 18px; }
.k-hr { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-mid); font-weight: 300; }
.k-form { display: flex; flex-direction: column; gap: 14px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.f-grp { display: flex; flex-direction: column; gap: 8px; }
.f-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.f-in, .f-ta, .f-sel { padding: 13px 16px; border: 1px solid var(--border); background: var(--input-bg); font-family: var(--sans); font-size: 14px; color: var(--text); font-weight: 300; outline: none; transition: var(--ease); width: 100%; appearance: none; border-radius: 0; }
.f-in:focus, .f-ta:focus, .f-sel:focus { border-color: var(--gold); background: var(--input-focus); box-shadow: 0 0 0 1px rgba(197,162,103,0.2);}
.f-ta { resize: vertical; min-height: 110px; }
.f-btn { background: var(--blue-rich); color: #fff; padding: 14px 36px; font-family: var(--sans); font-size: 12px; font-weight: 500; letter-spacing: 2.2px; text-transform: uppercase; border: none; cursor: pointer; transition: var(--ease); align-self: flex-start; border-radius: 2px; }
.f-btn:hover { background: var(--gold); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(197,162,103,0.3); color: #0a2540; }
[data-theme="dark"] .f-btn { background: var(--gold); color: #0f1a24; }
[data-theme="dark"] .f-btn:hover { background: var(--gold-light); }

/* ─── FOOTER ─── */
footer { background: var(--footer-bg); padding: 56px 60px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; border-top: 1px solid rgba(197,162,103,0.25); }
.f-logo { font-family: var(--serif); font-size: 26px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
.f-copy { font-size: 12px; color: var(--footer-text); font-weight: 300; }
.f-links { display: flex; gap: 28px; }
.f-links a { font-size: 11px; color: var(--footer-text); text-decoration: none; letter-spacing: 1.2px; transition: var(--ease); }
.f-links a:hover { color: var(--gold); }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp { from { opacity:0; transform:translateY(26px); } to { opacity:1; transform:translateY(0); } }
.hero-content > * { animation: fadeUp .8s var(--ease) both; }
.hero-eyebrow{animation-delay:.1s;} .hero h1{animation-delay:.2s;} .hero-sub{animation-delay:.34s;} .hero-btns{animation-delay:.48s;}

/* ─── RESPONSIVE ─── */
@media(max-width:980px){
  nav{padding:0 24px;} .nav-links{display:none;}
  .hero{padding:130px 28px 60px;} .hero-deco{display:none;}
  .sec-wrap{padding:64px 28px;}
  .usp-grid{grid-template-columns:1fr 1fr;}
  .profile-grid,.intl-grid,.k-grid{grid-template-columns:1fr; gap:44px;}
  .l-grid{grid-template-columns:1fr;}

<section id="philosophie"><div class="phil-sec"><div class="phil-inner"><div class="sec-label" data-de="Unser Konzept" data-en="Our Concept" data-fr="Notre Concept" data-ru="Концепция" data-ar="مفهومنا"></div><h2 class="phil-title" data-de="Medizin neu gedacht –<br><em>Prävention als System</em>" data-en="Medicine reimagined –<br><em>Prevention as a System</em>" data-fr="La médecine repensée –<br><em>La prévention comme système</em>" data-ru="Медицина по-новому –<br><em>Профилактика как система</em>" data-ar="طب جديد –<br><em>الوقاية كنظام</em>"></h2><div class="phil-line"></div><p class="phil-p" data-de="Die klassische Medizin setzt häufig erst an, wenn Erkrankungen bereits manifest sind. Im Zentrum für Präventivmedizin Yunusah liegt der Fokus auf der frühzeitigen Erkennung und gezielten Steuerung biologischer Systeme, bevor irreversible Schäden entstehen." data-en="Conventional medicine often intervenes only once disease has already manifested. At ZPYU, the focus is on early recognition and targeted management of biological systems before irreversible damage occurs." data-fr="La médecine conventionnelle n'intervient souvent que lorsque la maladie s'est manifestée. Au ZPYU, l'accent est mis sur la reconnaissance précoce avant que des dommages irréversibles ne surviennent." data-ru="Классическая медицина нередко вмешивается лишь тогда, когда болезнь уже проявилась. В ZPYU акцент делается на раннем выявлении до необратимых нарушений." data-ar="كثيراً ما تتدخل الطب التقليدي فقط بعد ظهور المرض. في ZPYU يتمحور التركيز حول التعرف المبكر قبل حدوث أضرار لا رجعة فيها."></p><p class="phil-p" data-de="Der Stoffwechsel steht dabei im Mittelpunkt – als zentrales Regulationssystem, das Energie, Hormone, Immunfunktion und langfristige Gesundheit koordiniert." data-en="Metabolism is at the centre – as the primary regulatory system coordinating energy, hormones, immune function, and long-term health." data-fr="Le métabolisme est au centre – système de régulation coordonnant énergie, hormones, immunité et santé à long terme." data-ru="Метаболизм в центре — система, координирующая энергию, гормоны, иммунитет и долгосрочное здоровье." data-ar="يقع التمثيل الغذائي في القلب – النظام التنظيمي الأساسي الذي ينسق الطاقة والهرمونات والمناعة."></p></div></div></section>

<script>
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeIcon').textContent = isDark?'☀️':'🌙';
  document.getElementById('themeLabel').textContent = isDark?'Hell':'Dunkel';
  localStorage.setItem('zpyu-theme', isDark?'light':'dark');
}
(function(){
  const saved=localStorage.getItem('zpyu-theme');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeIcon').textContent='🌙';
    document.getElementById('themeLabel').textContent='Dunkel';
  }
})();

let lang='de';
function setLang(l){
  lang=l;
  document.documentElement.setAttribute('lang',l);
  document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.querySelectorAll('.lang-bar button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.lang-bar button').forEach(b=>{
    if(b.textContent.trim().toLowerCase()===l) b.classList.add('active');
  });
  document.querySelectorAll('[data-'+l+']').forEach(el=>{
    const v=el.getAttribute('data-'+l);
    if(!v) return;
    if(el.tagName==='OPTION'||el.tagName==='LABEL') el.textContent=v;
    else el.innerHTML=v;
  });
}
function show(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  const t=document.getElementById(id);
  if(t){ t.classList.add('active'); window.scrollTo({top:34,behavior:'smooth'}); }
}
setLang('de');
</script>
