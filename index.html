<!DOCTYPE html>
<html lang="de" dir="ltr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ZPYU – Zentrum für Präventivmedizin Yunusah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&amp;family=Jost:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
:root {
    --ease: 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', 'Helvetica Neue', sans-serif;
    --blue: #3a6fa8; --blue-mid: #5285b8;
    --gold: #b8902a; --gold-l: #d4ab4e;
}
[data-theme="light"] {
    --bg:#fff; --bg2:#f8fafc; --bg3:#eef4fb;
    --text:#1e2d45; --text-mid:#4a5f78; --text-soft:#8a9db8;
    --border:rgba(58,111,168,0.13); --card:#fff;
    --nav-bg:rgba(255,255,255,0.97); --nav-shadow:0 2px 24px rgba(30,45,69,0.07);
    --hero-circle:#eef4fb; --section-alt:#f8fafc;
    --phil-bg:#3a6fa8; --phil-text:rgba(255,255,255,0.72);
    --footer-bg:#1e2d45; --footer-text:rgba(255,255,255,0.32);
    --input-bg:#f8fafc; --tag-border:rgba(58,111,168,0.25); --tag-color:#3a6fa8;
    --hours-bg:#f8fafc; --intl-right:#eef4fb; --intl-val:#3a6fa8;
}
[data-theme="dark"] {
    --bg:#0e1a2e; --bg2:#131f33; --bg3:#1a2a42;
    --text:#e8eef8; --text-mid:#9ab0cc; --text-soft:#5a7090;
    --border:rgba(58,111,168,0.22); --card:#152035;
    --nav-bg:rgba(14,26,46,0.97); --nav-shadow:0 2px 24px rgba(0,0,0,0.35);
    --hero-circle:#1a2a42; --section-alt:#111929;
    --phil-bg:#080e1a; --phil-text:rgba(255,255,255,0.58);
    --footer-bg:#080e1a; --footer-text:rgba(255,255,255,0.22);
    --input-bg:#152035; --tag-border:rgba(184,144,42,0.35); --tag-color:#c9a84c;
    --hours-bg:#152035; --intl-right:#152035; --intl-val:#c9a84c;
}
body {
    font-family: var(--sans);
    color: var(--text);
    background: var(--bg);
    overflow-x: hidden;
    transition: background-color var(--ease), color var(--ease);
}
[lang="ar"] { direction: rtl; }

/* LANG BAR */
.lang-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1001;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 34px;
}
.lang-bar-left { font-family: var(--serif); font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
.lang-bar-right { display: flex; gap: 4px; align-items: center; }
.lang-bar button {
    background: none;
    border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.65);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
}
.lang-bar button:hover, .lang-bar button.active { background: var(--gold); border-color: var(--gold); color: #fff; font-weight: 500; }

/* THEME TOGGLE */
.theme-tog {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 16px;
    margin-right: 8px;
}
.tog-track { width: 32px; height: 18px; background: rgba(255,255,255,0.25); border-radius: 9px; position: relative; flex-shrink: 0; }
[data-theme="dark"] .tog-track { background: var(--gold); }
.tog-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform var(--ease); }
[data-theme="dark"] .tog-thumb { transform: translateX(14px); }
.tog-lbl { font-size: 11px; color: rgba(255,255,255,0.75); letter-spacing: 1px; white-space: nowrap; }

/* NAV */
nav {
    position: fixed;
    top: 34px; left: 0; right: 0;
    z-index: 1000;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 68px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--nav-shadow);
}
.nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.nav-logo-zpyu { font-family: var(--serif); font-size: 26px; font-weight: 700; color: var(--blue); letter-spacing: 2px; }
[data-theme="dark"] .nav-logo-zpyu { color: var(--gold-l); }
.nav-logo-div { width: 1px; height: 22px; background: var(--border); }
.nav-logo-sub { font-family: var(--sans); font-size: 10px; color: var(--text-mid); letter-spacing: 1px; line-height: 1.4; text-transform: uppercase; }
.nav-links { display: flex; gap: 18px; list-style: none; align-items: center; }
.nav-links a {
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 400;
    color: var(--text-mid);
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: var(--ease);
    padding-bottom: 3px;
    cursor: pointer;
    white-space: nowrap;
}
.nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--gold); transition: var(--ease); }
.nav-links a:hover { color: var(--blue); }
[data-theme="dark"] .nav-links a:hover { color: var(--gold-l); }
.nav-links a:hover::after { width: 100%; }
.nav-cta { background: var(--blue)!important; color: #fff!important; padding: 8px 18px; border-radius: 2px; font-weight: 500!important; }
[data-theme="dark"] .nav-cta { background: var(--gold)!important; color: #0e1a2e!important; }
.nav-cta::after { display: none!important; }
.hamburger { display: none; background: none; border: none; font-size: 24px; color: var(--text-mid); cursor: pointer; }
section { display: none; }
section.active { display: block; animation: fadeIn 0.45s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* HERO */
.hero {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 140px 60px 80px;
    position: relative;
    overflow: hidden;
}
.hero-c1 { position: absolute; top: -140px; right: -140px; width: 700px; height: 700px; border-radius: 50%; background: var(--hero-circle); pointer-events: none; }
.hero-c2 { position: absolute; top: 60px; right: 60px; width: 440px; height: 440px; border-radius: 50%; border: 1px solid var(--border); pointer-events: none; }
.hero-content { max-width: 640px; position: relative; z-index: 1; }
.hero-eyebrow { font-family: var(--sans); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
.hero-eyebrow::before { content: ''; width: 36px; height: 1px; background: var(--gold); }
.hero h1 { font-family: var(--serif); font-size: clamp(40px,5vw,66px); font-weight: 300; color: var(--text); line-height: 1.15; margin-bottom: 28px; }
.hero h1 em { font-style: italic; color: var(--blue); }
[data-theme="dark"] .hero h1 em { color: var(--gold-l); }
.hero-sub { font-size: 16px; font-weight: 300; color: var(--text-mid); line-height: 1.75; margin-bottom: 46px; max-width: 480px; }
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-p { background: var(--blue); color: #fff; padding: 14px 30px; font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; border: none; border-radius: 2px; cursor: pointer; transition: var(--ease); }
.btn-p:hover { background: var(--blue-mid); transform: translateY(-2px); }
[data-theme="dark"] .btn-p { background: var(--gold); color: #0e1a2e; }
.btn-s { background: transparent; color: var(--blue); padding: 13px 30px; font-size: 12px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; transition: var(--ease); }
.btn-s:hover { border-color: var(--gold); color: var(--gold); }
.hero-deco { position: absolute; right: 50px; bottom: 40px; font-size: 200px; font-weight: 700; color: rgba(58,111,168,0.04); pointer-events: none; user-select: none; font-family: var(--serif); }

/* SHARED */
.sw { padding: 96px 60px; }
.sw.alt { background: var(--section-alt); }
.sec-label { font-family: var(--sans); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.sec-label::before { content: ''; width: 28px; height: 1px; background: var(--gold); }
.sec-title { font-family: var(--serif); font-size: clamp(30px,4vw,50px); font-weight: 300; color: var(--text); margin-bottom: 56px; line-height: 1.2; }
.sec-title em { font-style: italic; color: var(--blue); }
[data-theme="dark"] .sec-title em { color: var(--gold-l); }
.usp-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); }
.usp-card { background: var(--card); padding: 42px 28px; position: relative; transition: var(--ease); }
.usp-card:hover { background: var(--blue); transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
.usp-card:hover .usp-h, .usp-card:hover .usp-p { color: #fff; }
.usp-n { position: absolute; top: 10px; right: 14px; font-family: var(--serif); font-size: 68px; font-weight: 700; color: var(--border); line-height: 1; }
.usp-icon { width: 46px; height: 46px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 20px; }
.usp-h { font-family: var(--serif); font-size: 21px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
.usp-p { font-size: 13px; color: var(--text-mid); line-height: 1.7; font-weight: 300; }
.prof-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.prof-name { font-family: var(--serif); font-size: clamp(32px,4vw,52px); font-weight: 300; color: var(--text); margin-bottom: 6px; }
.prof-role { font-size: 13px; color: var(--blue); letter-spacing: .8px; margin-bottom: 28px; }
[data-theme="dark"] .prof-role { color: var(--gold-l); }
.prof-body { font-size: 15px; color: var(--text-mid); line-height: 1.8; font-weight: 300; margin-bottom: 28px; }
.p-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.p-tag { padding: 5px 14px; border: 1px solid var(--tag-border); color: var(--tag-color); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.why-box { background: var(--bg3); border: 1px solid var(--border); padding: 42px; position: relative; }
.why-box::before { content: ''; position: absolute; top: 0; left: 36px; width: 48px; height: 2px; background: var(--gold); }
.why-lbl { font-family: var(--sans); font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 26px; font-weight: 500; }
.why-item { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; color: var(--text-mid); font-size: 14px; line-height: 1.6; font-weight: 300; }
.why-item::before { content: '-'; color: var(--gold); flex-shrink: 0; }
.l-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); margin-top: 56px; }
.l-card { background: var(--card); padding: 42px 32px; }
.l-num { font-family: var(--serif); font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-bottom: 12px; display: block; }
.l-title { font-family: var(--serif); font-size: 23px; font-weight: 600; color: var(--text); margin-bottom: 22px; }
.l-list { list-style: none; }
.l-item { font-size: 13px; color: var(--text-mid); padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-weight: 300; }
.l-item::before { content: ''; width: 5px; height: 1px; background: var(--gold); }
.phil { background: var(--phil-bg); padding: 118px 60px; position: relative; overflow: hidden; }
.phil::before { content: '"'; position: absolute; top: 10px; left: 20px; font-family: var(--serif); font-size: 320px; color: rgba(255,255,255,0.04); pointer-events: none; }
.phil-inner { max-width: 780px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
.phil-title { font-family: var(--serif); font-size: clamp(32px,4vw,52px); font-weight: 300; color: #fff; margin-bottom: 42px; }
.phil-title em { font-style: italic; color: var(--gold-l); }
.phil-p { font-size: 16px; color: var(--phil-text); line-height: 1.9; font-weight: 300; margin-bottom: 22px; }
.phil-line { width: 50px; height: 1px; background: rgba(184,144,42,0.45); margin: 42px auto; }
.standorte-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: var(--border); margin-top: 56px; }
.st-card { background: var(--card); padding: 44px 36px; }
.st-badge { display: inline-block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 1px; margin-bottom: 18px; font-weight: 500; }
.st-badge.gold { background: var(--gold); color: #fff; }
.st-badge.blue { background: var(--blue); color: #fff; }
.st-name { font-family: var(--serif); font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.st-addr { font-size: 13px; color: var(--text-soft); margin-bottom: 20px; line-height: 1.6; }
.st-svcs { list-style: none; margin-bottom: 22px; }
.st-svcs li { font-size: 13px; color: var(--text-mid); padding: 7px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-weight: 300; }
.st-svcs li::before { content: ''; width: 4px; height: 1px; background: var(--gold); flex-shrink: 0; }
.st-hours { border-top: 1px solid var(--border); padding-top: 18px; margin-top: 4px; }
.st-hours-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.st-hr { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-mid); font-weight: 300; gap: 8px; }
.st-tel { font-size: 13px; color: var(--blue); font-weight: 400; margin-top: 16px; }
[data-theme="dark"] .st-tel { color: var(--gold-l); }
.team-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; background: var(--border); }
.team-card { background: var(--card); padding: 36px 28px; }
.team-avatar { width: 76px; height: 76px; border-radius: 50%; border: 2px solid var(--gold); background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: var(--gold); margin-bottom: 20px; }
.team-name { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.team-role { font-size: 12px; color: var(--gold); letter-spacing: .8px; margin-bottom: 14px; }
.team-body { font-size: 13px; color: var(--text-mid); line-height: 1.7; font-weight: 300; }
.team-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
.team-tag { padding: 4px 12px; border: 1px solid var(--tag-border); color: var(--tag-color); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
.intl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.intl-svcs { background: var(--border); margin-top: 34px; }
.intl-s { background: var(--card); padding: 17px 20px; display: flex; align-items: center; gap: 15px; font-size: 14px; color: var(--text-mid); font-weight: 300; border-left: 3px solid transparent; }
.intl-s:hover { border-left-color: var(--gold); background: var(--bg3); }
.flags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 26px; }
.flag { padding: 6px 14px; background: var(--card); border: 1px solid var(--border); font-size: 12px; border-radius: 2px; }
.intl-right { background: var(--intl-right); padding: 52px; }
.i-stat-val { font-family: var(--serif); font-size: 50px; font-weight: 300; color: var(--intl-val); }
.i-stat-lbl { font-size: 11px; color: var(--text-soft); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 5px; }
.k-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 56px; }
.k-info { display: flex; flex-direction: column; gap: 26px; }
.k-item { display: flex; gap: 18px; align-items: flex-start; }
.k-icon { width: 44px; height: 44px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.k-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 3px; }
.k-val { font-size: 15px; color: var(--text); font-weight: 300; }
.k-hours { background: var(--hours-bg); border: 1px solid var(--border); padding: 28px; }
.k-hours-t { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.k-hr { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-mid); gap: 8px; }
.k-form { display: flex; flex-direction: column; gap: 13px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.f-grp { display: flex; flex-direction: column; gap: 7px; }
.f-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.f-in, .f-ta, .f-sel { padding: 12px 14px; border: 1px solid var(--border); background: var(--input-bg); font-family: var(--sans); font-size: 14px; color: var(--text); font-weight: 300; outline: none; width: 100%; border-radius: 0; }
.f-in:focus, .f-ta:focus, .f-sel:focus { border-color: var(--gold); background: var(--bg3); }
.f-ta { resize: vertical; min-height: 108px; }
.f-btn { background: var(--blue); color: #fff; padding: 14px 32px; font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; transition: var(--ease); border-radius: 2px; }
.f-btn:hover { background: var(--gold); transform: translateY(-2px); }
footer { background: var(--footer-bg); padding: 54px 60px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
.f-logo { font-family: var(--serif); font-size: 24px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
.f-copy { font-size: 12px; color: var(--footer-text); font-weight: 300; }
.f-links { display: flex; gap: 22px; }
.f-links a { font-size: 11px; color: var(--footer-text); text-decoration: none; letter-spacing: 1px; transition: var(--ease); cursor: pointer; }
.f-links a:hover { color: var(--gold); }
.slider-wrap { position: relative; overflow: hidden; margin-top: 24px; }
.slider-track { display: flex; transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94); }
.slide { min-width: 100%; aspect-ratio: 16/9; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(30,45,69,0.55); backdrop-filter: blur(8px); border: 1px solid rgba(184,144,42,0.3); color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.slider-btn:hover { background: var(--gold); }
.slider-prev { left: 12px; }
.slider-next { right: 12px; }
.slider-dots { display: flex; justify-content: center; gap: 7px; padding: 10px 0 4px; }
.slider-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); border: none; cursor: pointer; }
.slider-dot.active { background: var(--gold); transform: scale(1.3); }
.route-btn { display: inline-flex; align-items: center; gap: 10px; margin-top: 18px; padding: 11px 22px; border: 1px solid var(--border); color: var(--text-mid); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: var(--ease); border-radius: 2px; cursor: pointer; background: transparent; }
.route-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(14,26,46,0.82); z-index: 2000; backdrop-filter: blur(6px); overflow-y: auto; padding: 40px 20px; }
.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.modal-box { background: var(--bg); max-width: 760px; width: 100%; padding: 52px; position: relative; border-top: 3px solid var(--gold); box-shadow: 0 24px 80px rgba(0,0,0,0.35); }
.modal-close { position: absolute; top: 20px; right: 24px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-soft); }
.modal-close:hover { color: var(--gold); }
.modal-box h1 { font-family: var(--serif); font-size: 30px; font-weight: 300; margin-bottom: 8px; }
.modal-box h2 { font-family: var(--serif); font-size: 20px; font-weight: 600; margin: 28px 0 10px; padding-top: 20px; border-top: 1px solid var(--border); }
.modal-box p, .modal-box li { font-size: 14px; color: var(--text-mid); line-height: 1.8; font-weight: 300; }

<script>
let currentLang = 'de';
const themeTog = document.getElementById('themeTog');
if(themeTog) themeTog.addEventListener('click', function() {
    const html = document.documentElement;
    const dark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', dark ? 'light' : 'dark');
    document.getElementById('themeIcon')?.remove();
});
function setLang(l) {
    currentLang = l;
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    document.querySelectorAll('.lang-bar button').forEach(btn => { btn.classList.remove('active'); if(btn.innerText.trim().toLowerCase() === l) btn.classList.add('active'); });
    document.querySelectorAll('[data-'+l+']').forEach(el => {
        let val = el.getAttribute('data-'+l);
        if(!val) return;
        if(el.tagName === 'OPTION' || el.tagName === 'LABEL') el.textContent = val;
        else if(el.tagName === 'OPTGROUP') el.setAttribute('label', val);
        else el.innerHTML = val;
    });
}
function showSec(id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(id);
    if(target) target.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('mainNav')?.classList.remove('nav-mobile-open');
    document.querySelectorAll('.nav-links a').forEach(a => {
        a.classList.remove('nav-active');
        if(a.getAttribute('onclick') && a.getAttribute('onclick').includes("'"+id+"'")) a.classList.add('nav-active');
    });
}
document.getElementById('hambBtn')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('mainNav')?.classList.toggle('nav-mobile-open'); });
document.addEventListener('click', e => { const nav = document.getElementById('mainNav'); if(nav?.classList.contains('nav-mobile-open') && !nav.contains(e.target)) nav.classList.remove('nav-mobile-open'); });
function initSlider(id) {
    const wrap = document.getElementById(id);
    if(!wrap) return;
    const track = wrap.querySelector('.slider-track'), dots = wrap.querySelectorAll('.slider-dot'), slides = wrap.querySelectorAll('.slide');
    let cur = 0;
    const go = (n) => { cur = (n + slides.length) % slides.length; track.style.transform = `translateX(-${cur * 100}%)`; dots.forEach((d,i)=> d.classList.toggle('active', i===cur)); };
    wrap.querySelector('.slider-prev')?.addEventListener('click', ()=>go(cur-1));
    wrap.querySelector('.slider-next')?.addEventListener('click', ()=>go(cur+1));
    dots.forEach((d,i)=> d.addEventListener('click', ()=>go(i)));
    setInterval(()=>go(cur+1), 5000);
}
document.addEventListener('DOMContentLoaded', () => { initSlider('slider-hansaallee'); initSlider('slider-grafenberger'); setLang('de'); });
function openModal(id) { document.getElementById(id)?.classList.add('open'); document.body.style.overflow = 'hidden'; setLang(currentLang); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); document.body.style.overflow = ''; }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target === o) closeModal(o.id); }));
document.addEventListener('keydown', e => { if(e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id)); });
function switchStandort(which) {
    document.getElementById('k-hansa').style.display = which === 'hansa' ? '' : 'none';
    document.getElementById('k-graf').style.display = which === 'graf' ? '' : 'none';
    const gold = 'var(--gold)';
    document.getElementById('tab-hansa').style.background = which === 'hansa' ? gold : 'transparent';
    document.getElementById('tab-graf').style.background = which === 'graf' ? gold : 'transparent';
    document.getElementById('tab-hansa').style.color = which === 'hansa' ? '#fff' : 'var(--text-mid)';
    document.getElementById('tab-graf').style.color = which === 'graf' ? '#fff' : 'var(--text-mid)';
}
window.dismissPopup = function() { const pop = document.getElementById('nl-popup'); if(pop) { pop.classList.remove('show'); pop.classList.add('hide'); } };
(function(){
    const countKey = 'zpyu_nl_popup_count', max = 7;
    let cnt = parseInt(localStorage.getItem(countKey) || '0', 10);
    if(cnt >= max) return;
    localStorage.setItem(countKey, cnt+1);
    setTimeout(()=>{ document.getElementById('nl-popup')?.classList.add('show'); }, 3000);
    setTimeout(()=>{ dismissPopup(); }, 33000);
})();
</script>
