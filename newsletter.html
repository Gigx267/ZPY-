<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0C0C;--bg-elevated:#151515;--bg-card:#1A1A1A;--border:#2A2A2A;--border-focus:#7A8B6F;--text-primary:#F0EDE8;--text-secondary:#9A9690;--text-muted:#6B6860;--accent:#7A8B6F;--accent-light:#A8B89E;--accent-pale:rgba(122,139,111,0.12);--gold:#C4A86B;--error:#C45B5B}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
html[dir="rtl"]{direction:rtl;text-align:right}
html[dir="rtl"] .nav-back{direction:ltr}
html[dir="rtl"] .consent{text-align:right}
.page-wrapper{display:flex;flex-direction:column;min-height:100vh}
.nav{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-brand{font-size:1.1rem;font-weight:600;color:var(--text-primary);text-decoration:none;letter-spacing:3px;text-transform:uppercase}
.nav-back{font-size:0.8rem;color:var(--text-secondary);text-decoration:none;transition:color .3s}
.nav-back:hover{color:var(--accent-light)}
.lang-switcher{display:flex;gap:4px;align-items:center}
.lang-btn{padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;letter-spacing:.5px;color:var(--text-muted);background:none;border:1px solid transparent;border-radius:4px;cursor:pointer;transition:all .2s}
.lang-btn:hover{color:var(--text-secondary);border-color:var(--border)}
.lang-btn.active{color:var(--accent-light);border-color:var(--accent);background:var(--accent-pale)}
.hero{position:relative;padding:5rem 2rem 4rem;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(122,139,111,.06) 0%,transparent 65%);animation:pulse 15s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.6}50%{transform:translateX(-50%) scale(1.15);opacity:1}}
.hero-content{position:relative;z-index:2;max-width:640px;margin:0 auto}
.badge{display:inline-block;padding:6px 16px;background:var(--accent-pale);color:var(--accent-light);font-size:.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;border-radius:100px;border:1px solid rgba(122,139,111,.2);margin-bottom:2rem;animation:slideDown .8s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5.5vw,3.2rem);font-weight:600;line-height:1.2;margin-bottom:1rem;animation:fadeUp 1s ease-out .2s both}
.hero h1 em{font-style:italic;color:var(--accent-light)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-description{font-size:.95rem;line-height:1.75;color:var(--text-secondary);max-width:500px;margin:0 auto 2.5rem;animation:fadeUp 1s ease-out .4s both}
.divider{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 2rem;animation:fadeUp 1s ease-out .3s both}
.pillars{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;animation:fadeUp 1s ease-out .6s both}
.pillar{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-muted)}
.pillar-dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.form-section{padding:0 2rem 5rem;text-align:center}
.form-card{max-width:580px;margin:0 auto;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:2rem 1.8rem}
.form-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:.4rem}
.form-subtitle{font-size:.82rem;color:var(--text-muted);margin-bottom:1rem;line-height:1.5}
/* CleverReach styling with dark mode integration */
.cr_site {
    background-color: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    text-align: left;
}
.cr_page {
    max-width: 100% !important;
    width: 100% !important;
    background: transparent !important;
    box-shadow: none !important;
}
.cr_body {
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 !important;
    color: var(--text-primary) !important;
    font-family: 'DM Sans', sans-serif !important;
}
.editable_content, .cr_body #editable_content {
    padding: 0 !important;
}
.cr_form-component, .cr_ipe_item {
    margin: 0 0 1rem 0 !important;
    padding: 0 !important;
}
.cr_form-inputgroup label {
    font-size: .7rem !important;
    font-weight: 600 !important;
    letter-spacing: 1.5px !important;
    text-transform: uppercase !important;
    color: var(--text-muted) !important;
    margin-bottom: 6px !important;
    display: block !important;
    font-family: 'DM Sans', sans-serif !important;
}
.cr_form-inputgroup input {
    width: 100% !important;
    padding: 13px 16px !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: .9rem !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    background: var(--bg-elevated) !important;
    color: var(--text-primary) !important;
    transition: all .3s ease !important;
    outline: none !important;
}
.cr_form-inputgroup input:focus {
    border-color: var(--border-focus) !important;
    box-shadow: 0 0 0 3px rgba(122,139,111,.15) !important;
}
.cr_form-inputgroup input::placeholder {
    color: #4A4A4A !important;
}
.cr_button {
    background-color: var(--accent) !important;
    color: #fff !important;
    border: none !important;
    border-radius: 8px !important;
    padding: 14px 20px !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: .85rem !important;
    font-weight: 600 !important;
    letter-spacing: 1.5px !important;
    text-transform: uppercase !important;
    width: 100% !important;
    height: auto !important;
    line-height: normal !important;
    transition: all .3s ease !important;
    cursor: pointer !important;
}
.cr_button:hover {
    background-color: #6A7B5F !important;
    transform: translateY(-1px) !important;
    box-shadow: 0 4px 24px rgba(122,139,111,.25) !important;
    opacity: 1 !important;
}
.g-recaptcha {
    transform: scale(0.92);
    transform-origin: 0 0;
    margin: 8px 0 5px 0;
}
.clever_form_error {
    background-color: rgba(196,91,91,0.2) !important;
    border: 1px solid var(--error) !important;
}
.clever_form_note {
    background-color: var(--accent-pale) !important;
    color: var(--accent-light) !important;
    font-size: 11px !important;
    border-radius: 6px !important;
    margin-top: 6px !important;
    position: relative !important;
    display: inline-block !important;
}
.badge {
    display: none !important;
}
/* GDPR Consent & reCaptcha Notice */
.consent-checkbox-wrapper {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 1.2rem 0 0.8rem 0;
    padding: 0.8rem 1rem;
    background: var(--accent-pale);
    border: 1px solid rgba(122,139,111,.2);
    border-radius: 10px;
}
.consent-checkbox-wrapper input {
    margin-top: 2px;
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    flex-shrink: 0;
    cursor: pointer;
}
.consent-checkbox-wrapper label {
    font-size: .75rem;
    line-height: 1.5;
    color: var(--text-secondary);
    cursor: pointer;
}
.consent-checkbox-wrapper a {
    color: var(--accent-light);
    text-decoration: underline;
}
.recaptcha-notice {
    font-size: .65rem;
    line-height: 1.4;
    color: var(--text-muted);
    background: rgba(107,104,96,0.15);
    padding: 10px 12px;
    border-radius: 8px;
    margin: 1rem 0 0.5rem 0;
    text-align: left;
}
.recaptcha-notice p {
    margin-bottom: 4px;
}
.recaptcha-notice a {
    color: var(--accent-light);
    text-decoration: underline;
}
.success-message-cr {
    display: none;
    text-align: center;
    padding: 1.5rem 0;
    animation: fadeUp .6s ease-out;
}
.success-message-cr.show {
    display: block;
}
.success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
}
.success-icon svg {
    width: 24px;
    height: 24px;
    color: var(--accent-light);
}
.footer{margin-top:auto;padding:2rem;text-align:center;border-top:1px solid var(--border)}
.footer-practice{font-size:.8rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.footer-address{font-size:.75rem;color:var(--text-muted);margin-bottom:.75rem}
.footer-legal{font-size:.68rem;color:#4A4640;line-height:1.6}
.footer-legal a{color:var(--text-muted);text-decoration:none}
.footer-legal a:hover{color:var(--accent-light)}

var currentLang='de';

function setLang(lang){
    currentLang=lang;
    var t=T[lang];
    document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
    document.documentElement.setAttribute('lang',lang);
    document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(t[k])el.textContent=t[k];});
    document.querySelectorAll('[data-i18n-html]').forEach(function(el){var k=el.getAttribute('data-i18n-html');if(t[k])el.innerHTML=t[k];});
    document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.textContent.trim().toLowerCase()===lang);});
    // Update consent label explicitly
    var consentLabelSpan = document.getElementById('consentLabelText');
    if(consentLabelSpan && t.consentText) consentLabelSpan.innerHTML = t.consentText;
    // Update email label
    var emailLabel = document.querySelector('label[for="text9748594"]');
    if(emailLabel && t.labelEmail) emailLabel.innerHTML = t.labelEmail + '*';
    var submitBtn = document.querySelector('.cr_button');
    if(submitBtn && t.submitBtn) submitBtn.textContent = t.submitBtn;
}

// CleverReach original validation script + GDPR consent enforcement
function loadjQuery(e,t){var n=document.createElement("script");n.setAttribute("src",e);n.onload=t;n.onreadystatechange=function(){if(this.readyState=="complete"||this.readyState=="loaded")t()};document.getElementsByTagName("head")[0].appendChild(n)}
function main(){
    var $cr=jQuery.noConflict();
    $cr(document).ready(function(){
        $cr(".cr_form").submit(function(e){
            var consentChecked = document.getElementById('consentNewsletter');
            if(!consentChecked || !consentChecked.checked) {
                var wrap = document.getElementById('consentWrapper');
                if(wrap) wrap.style.outline = "2px solid var(--error)";
                setTimeout(() => { if(wrap) wrap.style.outline = ""; }, 2500);
                e.preventDefault();
                return false;
            }
            $cr(this).find('.clever_form_error').removeClass('clever_form_error');
            $cr(this).find('.clever_form_note').remove();
            $cr(this).find(".musthave").find('input, textarea').each(function(){
                if($cr.trim($cr(this).val())==""||($cr(this).is(':checkbox'))||($cr(this).is(':radio'))){
                    if($cr(this).is(':checkbox')||($cr(this).is(':radio'))){
                        if(!$cr(this).parents(".cr_ipe_item").find(":checked").is(":checked")){
                            $cr(this).parents(".cr_ipe_item").addClass('clever_form_error')
                        }
                    }else{
                        $cr(this).addClass('clever_form_error')
                    }
                }
            });
            if($cr(this).find('.clever_form_error').length){return false}
            return true;
        });
    });
}
if(typeof jQuery==="undefined"){loadjQuery("//ajax.googleapis.com/ajax/libs/jquery/1.4.4/jquery.min.js",main)}else{main()}

// Success message handling after submitting CleverReach in new tab
document.addEventListener('DOMContentLoaded', function() {
    setLang('de');
    const crForm = document.getElementById('cleverReachNewsletterForm');
    const container = document.getElementById('crFormContainer');
    const successDiv = document.getElementById('successMessageCr');
    
    if(crForm) {
        crForm.addEventListener('submit', function() {
            // Show success message and hide form after short delay (opens new tab)
            setTimeout(() => {
                if(container && crForm.style.display !== 'none') {
                    crForm.style.display = 'none';
                    successDiv.classList.add('show');
                }
            }, 300);
        });
    }
    
    // style adjustments for recaptcha dark theme based on background
    var recaptchaDiv = document.querySelector('.g-recaptcha');
    if(recaptchaDiv) recaptchaDiv.setAttribute('data-theme', 'dark');
});
</script>
