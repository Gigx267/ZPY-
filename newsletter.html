<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter — ZPYU</title>
<meta name="description" content="Newsletter des ZPYU Düsseldorf – Gesundheitsthemen, Praxisneuigkeiten und Veranstaltungen.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0C0C;--bg-elevated:#151515;--bg-card:#1A1A1A;--border:#2A2A2A;--border-focus:#7A8B6F;--text-primary:#F0EDE8;--text-secondary:#9A9690;--text-muted:#6B6860;--accent:#7A8B6F;--accent-light:#A8B89E;--accent-pale:rgba(122,139,111,0.12);--gold:#C4A86B;--error:#C45B5B}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
html[dir="rtl"]{direction:rtl;text-align:right}
html[dir="rtl"] .nav-back{direction:ltr}
html[dir="rtl"] .consent{text-align:right}
html[dir="rtl"] .form-group{text-align:right}
.page-wrapper{display:flex;flex-direction:column;min-height:100vh}
.nav{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-brand{font-size:1.1rem;font-weight:600;color:var(--text-primary);text-decoration:none;letter-spacing:3px;text-transform:uppercase}
.nav-back{font-size:0.8rem;color:var(--text-secondary);text-decoration:none;transition:color .3s}
.nav-back:hover{color:var(--accent-light)}
.lang-switcher{display:flex;gap:4px;align-items:center}
.lang-btn{padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;letter-spacing:.5px;color:var(--text-muted);background:none;border:1px solid transparent;border-radius:4px;cursor:pointer;transition:all .2s}
.lang-btn:hover{color:var(--text-secondary);border-color:var(--border)}
.lang-btn.active{color:var(--accent-light);border-color:var(--accent);background:var(--accent-pale)}
.hero{position:relative;padding:5rem 2rem 4rem;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(122,139,111,.06) 0%,transparent 65%);animation:pulse 15s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.6}50%{transform:translateX(-50%) scale(1.15);opacity:1}}
.hero-content{position:relative;z-index:2;max-width:640px;margin:0 auto}
.badge{display:inline-block;padding:6px 16px;background:var(--accent-pale);color:var(--accent-light);font-size:.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;border-radius:100px;border:1px solid rgba(122,139,111,.2);margin-bottom:2rem;animation:slideDown .8s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5.5vw,3.2rem);font-weight:600;line-height:1.2;margin-bottom:1rem;animation:fadeUp 1s ease-out .2s both}
.hero h1 em{font-style:italic;color:var(--accent-light)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-description{font-size:.95rem;line-height:1.75;color:var(--text-secondary);max-width:500px;margin:0 auto 2.5rem;animation:fadeUp 1s ease-out .4s both}
.divider{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 2rem;animation:fadeUp 1s ease-out .3s both}
.pillars{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;animation:fadeUp 1s ease-out .6s both}
.pillar{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-muted)}
.pillar-dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.form-section{padding:0 2rem 5rem;text-align:center}
.form-card{max-width:480px;margin:0 auto;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem}
.form-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:.4rem}
.form-subtitle{font-size:.82rem;color:var(--text-muted);margin-bottom:2rem;line-height:1.5}
.form-group{margin-bottom:1rem;text-align:left}
.form-group label{display:block;font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.form-group input{width:100%;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;border:1px solid var(--border);border-radius:8px;background:var(--bg-elevated);color:var(--text-primary);transition:all .3s ease;outline:none}
.form-group input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(122,139,111,.15)}
.form-group input::placeholder{color:#4A4A4A}
.name-row{display:flex;gap:.75rem}
.name-row .form-group{flex:1}
.consent{display:flex;align-items:flex-start;gap:10px;text-align:left;margin:1.5rem 0;padding:1rem;background:var(--accent-pale);border:1px solid rgba(122,139,111,.15);border-radius:8px}
.consent input[type="checkbox"]{margin-top:2px;width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.consent-text{font-size:.75rem;line-height:1.6;color:var(--text-secondary)}
.consent-text a{color:var(--accent-light);text-decoration:underline;text-decoration-color:rgba(168,184,158,.3)}
.submit-btn{width:100%;padding:15px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:var(--accent);border:none;border-radius:8px;cursor:pointer;transition:all .3s ease}
.submit-btn:hover{background:#6A7B5F;transform:translateY(-1px);box-shadow:0 4px 24px rgba(122,139,111,.25)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.success-message{display:none;text-align:center;padding:1.5rem 0;animation:fadeUp .6s ease-out}
.success-message.show{display:block}
.success-icon{width:56px;height:56px;border-radius:50%;background:var(--accent-pale);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.success-icon svg{width:24px;height:24px;color:var(--accent-light)}
.success-message h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:.5rem}
.success-message p{font-size:.85rem;color:var(--text-secondary);line-height:1.6}
.footer{margin-top:auto;padding:2rem;text-align:center;border-top:1px solid var(--border)}
.footer-practice{font-size:.8rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.footer-address{font-size:.75rem;color:var(--text-muted);margin-bottom:.75rem}
.footer-legal{font-size:.68rem;color:#4A4640;line-height:1.6}
.footer-legal a{color:var(--text-muted);text-decoration:none}
.footer-legal a:hover{color:var(--accent-light)}
.form-group.error input{border-color:var(--error)}
.error-text{font-size:.72rem;color:var(--error);margin-top:4px;display:none}
.form-group.error .error-text{display:block}
.consent-error-outline{outline:2px solid var(--error)!important;outline-offset:2px}
@media(max-width:520px){.name-row{flex-direction:column;gap:0}.hero{padding:3rem 1.5rem}.form-section{padding:0 1.5rem 3rem}.form-card{padding:2rem 1.5rem}.nav{padding:1rem 1.5rem}}
</style>
</head>

</div>

<input type="checkbox" id="consent" name="consent" value="yes" required>

</form>

<div class="success-icon">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>

<p data-i18n-html="successText"></p>
</div>
</div>
</section>

var currentLang='de';
function setLang(lang){
currentLang=lang;
var t=T[lang];
document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
document.documentElement.setAttribute('lang',lang);
document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(t[k])el.textContent=t[k]});
document.querySelectorAll('[data-i18n-html]').forEach(function(el){var k=el.getAttribute('data-i18n-html');if(t[k])el.innerHTML=t[k]});
document.querySelectorAll('[data-i18n-ph]').forEach(function(el){var k=el.getAttribute('data-i18n-ph');if(t[k])el.placeholder=t[k]});
document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.textContent.trim().toLowerCase()===lang)});
}

var form=document.getElementById('newsletterForm');
var submitBtn=document.getElementById('submitBtn');
var successMsg=document.getElementById('successMessage');
var formContainer=document.querySelector('.form-card form');

function showValidationError(element, show){
if(show){
element.closest('.form-group').classList.add('error');
}else{
if(element.closest('.form-group')) element.closest('.form-group').classList.remove('error');
}
}

function validateEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

form.addEventListener('submit', function(e){
e.preventDefault();

var vornameField=document.getElementById('vorname');
var nachnameField=document.getElementById('nachname');
var emailField=document.getElementById('email');
var consentCheck=document.getElementById('consent');
var consentWrap=document.getElementById('consentWrapper');

var isValid=true;

if(!vornameField.value.trim()){
showValidationError(vornameField, true);
isValid=false;
}else{
showValidationError(vornameField, false);
}

if(!nachnameField.value.trim()){
showValidationError(nachnameField, true);
isValid=false;
}else{
showValidationError(nachnameField, false);
}

if(!emailField.value.trim() || !validateEmail(emailField.value.trim())){
showValidationError(emailField, true);
isValid=false;
}else{
showValidationError(emailField, false);
}

if(!consentCheck.checked){
consentWrap.classList.add('consent-error-outline');
setTimeout(function(){consentWrap.classList.remove('consent-error-outline');},3000);
isValid=false;
}else{
consentWrap.classList.remove('consent-error-outline');
}

if(isValid){
submitBtn.disabled=true;
var originalText=submitBtn.textContent;
submitBtn.textContent=T[currentLang].submitting;

var formData=new FormData(form);
fetch(form.action, {
method: 'POST',
body: formData,
headers: { 'Accept': 'application/json' }
})
.then(response => {
if(response.ok){
form.style.display='none';
successMsg.classList.add('show');
} else {
return response.json().then(data => { throw new Error(data.error || 'Formspree Fehler'); });
}
})
.catch(error => {
submitBtn.disabled=false;
submitBtn.textContent=originalText;
alert(error.message || 'Verbindungsfehler. Bitte versuchen Sie es erneut.');
});
}
});

document.querySelectorAll('input').forEach(function(i){
i.addEventListener('input',function(){
if(i.closest('.form-group')) i.closest('.form-group').classList.remove('error');
if(i.id==='consent'){
document.getElementById('consentWrapper').classList.remove('consent-error-outline');
}
});
});
setLang('de');
</script>

</html>
